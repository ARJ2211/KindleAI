version: "3.8"

services:
  # --INDIVIDUAL RUN COMMAND: docker compose up qdrant
  qdrant:
    image: qdrant/qdrant:latest
    container_name: kindleai-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"  
    volumes:
      - qdrant_data:/qdrant/storage

  # --INDIVIDUAL RUN COMMAND: docker compose up redis
  redis:
    image: redis/redis-stack-server:latest
    container_name: kindleai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  qdrant_data:
  redis_data: