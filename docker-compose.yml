
services:
  # --INDIVIDUAL RUN COMMAND: docker compose up qdrant
  qdrant:
    image: qdrant/qdrant:latest
    container_name: kindleai-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  # --INDIVIDUAL RUN COMMAND: docker compose up redis
  redis:
    image: redis/redis-stack-server:latest
    container_name: kindleai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # --INDIVIDUAL RUN COMMAND: docker compose up mongo
  mongo:
    image: mongo:latest
    restart: always
    ports:
      - "27017:27017"

  # --INDIVIDUAL RUN COMMAND: docker compose up backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kindleai-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      MONGO_DB: KindleAI
      MONGO_URL: mongodb://mongo:27017/
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - qdrant
      - redis
      - mongo

volumes:
  qdrant_data:
  redis_data: